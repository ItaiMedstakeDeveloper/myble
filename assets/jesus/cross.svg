<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgCross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#241a3d"/>
      <stop offset="100%" stop-color="#100b1f"/>
    </linearGradient>
    <linearGradient id="rayGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f2c14e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f2c14e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c98a3c"/>
      <stop offset="100%" stop-color="#8a5a25"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="240" rx="18" fill="url(#bgCross)"/>

  <!-- radiant glow behind the cross -->
  <circle cx="100" cy="110" r="85" fill="url(#rayGlow)"/>
  <g stroke="#f2c14e" stroke-width="2" opacity="0.35">
    <line x1="100" y1="15" x2="100" y2="35"/>
    <line x1="100" y1="185" x2="100" y2="205"/>
    <line x1="15" y1="110" x2="35" y2="110"/>
    <line x1="165" y1="110" x2="185" y2="110"/>
    <line x1="45" y1="55" x2="58" y2="68"/>
    <line x1="142" y1="152" x2="155" y2="165"/>
    <line x1="155" y1="55" x2="142" y2="68"/>
    <line x1="58" y1="152" x2="45" y2="165"/>
  </g>

  <!-- the cross itself -->
  <g>
    <rect x="88" y="35" width="24" height="150" rx="4" fill="url(#woodGrad)" stroke="#5c3a1a" stroke-width="2"/>
    <rect x="50" y="78" width="100" height="24" rx="4" fill="url(#woodGrad)" stroke="#5c3a1a" stroke-width="2"/>
    <!-- subtle wood grain lines -->
    <line x1="94" y1="40" x2="94" y2="180" stroke="#5c3a1a" stroke-width="1" opacity="0.4"/>
    <line x1="106" y1="40" x2="106" y2="180" stroke="#5c3a1a" stroke-width="1" opacity="0.4"/>
    <line x1="56" y1="85" x2="144" y2="85" stroke="#5c3a1a" stroke-width="1" opacity="0.4"/>
    <line x1="56" y1="95" x2="144" y2="95" stroke="#5c3a1a" stroke-width="1" opacity="0.4"/>
  </g>

  <text x="100" y="215" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#f5f0e6" text-anchor="middle">Jesus Christ</text>
  <text x="100" y="232" font-family="Georgia, serif" font-size="11" fill="#f5f0e6" opacity="0.8" text-anchor="middle">Jesu Kristu</text>
</svg>
